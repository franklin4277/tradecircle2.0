<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | TradeCircle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="reset-password">
    <header class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="logo">
                <span class="logo-mark">TC</span>
                <span>TradeCircle</span>
            </a>

            <form id="navSearchForm" class="nav-search" autocomplete="off">
                <input id="navSearchInput" type="search" placeholder="Search products...">
                <button type="submit" class="btn btn-primary">Search</button>
            </form>

            <nav id="authLinks" class="nav-links" aria-label="Primary"></nav>
        </div>
    </header>

    <main class="page-wrap auth-page">
        <section class="panel auth-panel">
            <div class="panel-head">
                <h1>Set New Password</h1>
                <p>Use your reset token link and set a strong new password.</p>
            </div>

            <form id="resetPasswordForm" class="form-stack" autocomplete="off">
                <label>
                    Reset Token
                    <input id="resetTokenInput" type="text" name="token" required placeholder="Paste reset token">
                </label>

                <label>
                    New Password
                    <input type="password" name="password" required minlength="8" placeholder="At least 8 chars, letters and numbers">
                </label>

                <label>
                    Confirm Password
                    <input type="password" name="confirmPassword" required minlength="8" placeholder="Re-enter new password">
                </label>

                <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
            </form>

            <p class="panel-foot">
                Remembered your password?
                <a href="login.html">Go to login</a>
            </p>
        </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="script.js" defer></script>
</body>
</html>
