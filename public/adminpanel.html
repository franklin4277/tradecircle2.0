<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin control center for moderating listings and managing users on TradeCircle.">
    <title>Admin Panel - TradeCircle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="topbar">
    <a class="brand" href="index.html">TradeCircle Admin Console</a>
    <div class="top-links">
        <a href="index.html">Marketplace</a>
        <button class="logout-btn" onclick="logout()" type="button">Logout</button>
    </div>
</nav>

<main class="container admin-stack">
    <section class="panel page-banner">
        <p class="eyebrow">Operations</p>
        <h3>Moderation and account governance</h3>
        <p class="hero-copy">Use these controls to keep listing quality high and platform access secure.</p>
    </section>

    <section class="panel">
        <p class="eyebrow">Listing Moderation</p>
        <h3>Manage Listings</h3>
        <div class="admin-filter-row">
            <select id="adminListingFilter">
                <option value="all">All Statuses</option>
                <option value="approved">Approved</option>
                <option value="pending">Pending</option>
                <option value="rejected">Rejected</option>
                <option value="taken_down">Taken Down</option>
            </select>
        </div>
        <p id="adminStatus" class="status" aria-live="polite"></p>
        <div id="adminListings" class="listing-grid"></div>
    </section>

    <section class="panel">
        <p class="eyebrow">User Control</p>
        <h3>Manage People</h3>
        <p id="adminUsersStatus" class="status" aria-live="polite"></p>
        <div id="users" class="listing-grid"></div>
    </section>
</main>

<footer class="site-footer">
    <div class="container footer-inner">
        <p>TradeCircle Administration</p>
        <a href="index.html">Open Marketplace</a>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
