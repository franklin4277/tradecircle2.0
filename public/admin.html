<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | TradeCircle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="admin">
    <header class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="logo">
                <span class="logo-mark">TC</span>
                <span>TradeCircle</span>
            </a>

            <form id="navSearchForm" class="nav-search" autocomplete="off">
                <input id="navSearchInput" type="search" placeholder="Search products...">
                <button type="submit" class="btn btn-primary">Search</button>
            </form>

            <nav id="authLinks" class="nav-links" aria-label="Primary"></nav>
        </div>
    </header>

    <main class="page-wrap">
        <section class="panel">
            <div class="panel-head row-between">
                <div>
                    <h1>Admin Analytics</h1>
                    <p>Marketplace overview and moderation queue.</p>
                </div>
                <button id="refreshAdminBtn" type="button" class="btn btn-secondary">Refresh Data</button>
            </div>

            <div id="analyticsCards" class="analytics-grid"></div>
        </section>

        <section class="panel">
            <div class="panel-head">
                <h2>Pending Listings</h2>
                <p>Approve or reject submissions from users.</p>
            </div>
            <div id="pendingListings" class="listing-grid"></div>
        </section>

        <section class="panel">
            <div class="panel-head row-between">
                <div>
                    <h2>All Listings</h2>
                    <p>Filter listings by status and moderate quickly.</p>
                </div>
                <select id="adminStatusFilter" class="status-filter">
                    <option value="">All statuses</option>
                    <option value="pending">Pending</option>
                    <option value="approved">Approved</option>
                    <option value="rejected">Rejected</option>
                </select>
            </div>
            <div id="adminListings" class="listing-grid"></div>
        </section>

        <section class="panel">
            <div class="panel-head">
                <h2>Reports</h2>
                <p>Fraud and abuse reports from users.</p>
            </div>

            <div class="report-wrap">
                <table class="report-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Listing</th>
                            <th>Reason</th>
                            <th>Reporter</th>
                            <th>Seller</th>
                        </tr>
                    </thead>
                    <tbody id="reportRows"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="script.js" defer></script>
</body>
</html>
