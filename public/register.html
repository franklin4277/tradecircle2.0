<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | TradeCircle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="register">
    <header class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="logo">
                <span class="logo-mark">TC</span>
                <span>TradeCircle</span>
            </a>

            <form id="navSearchForm" class="nav-search" autocomplete="off">
                <input id="navSearchInput" type="search" placeholder="Search products...">
                <button type="submit" class="btn btn-primary">Search</button>
            </form>

            <nav id="authLinks" class="nav-links" aria-label="Primary"></nav>
        </div>
    </header>

    <main class="page-wrap auth-page">
        <section class="panel auth-panel">
            <div class="panel-head">
                <h1>Create your account</h1>
                <p>Start buying and selling in a secure community.</p>
            </div>

            <form id="registerForm" class="form-stack" autocomplete="on">
                <label>
                    Full name
                    <input type="text" name="name" required minlength="2" maxlength="80" placeholder="Jane Doe">
                </label>

                <label>
                    Email
                    <input type="email" name="email" required placeholder="you@example.com">
                </label>

                <label>
                    Phone number (optional)
                    <input type="tel" name="phoneNumber" maxlength="24" placeholder="+254712345678">
                </label>

                <label>
                    City (optional)
                    <input type="text" name="city" maxlength="80" placeholder="Nairobi">
                </label>

                <label>
                    Password
                    <input type="password" name="password" required minlength="6" placeholder="At least 6 characters">
                </label>

                <label>
                    Admin secret (optional)
                    <input type="password" name="adminSecret" placeholder="Only if provided by system admin">
                </label>

                <button type="submit" class="btn btn-primary btn-block">Register</button>
            </form>

            <p class="panel-foot">
                Already have an account?
                <a href="login.html">Login</a>
            </p>
        </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="script.js" defer></script>
</body>
</html>
