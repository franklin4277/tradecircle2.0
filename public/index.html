<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeCircle | Trusted Digital Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="index">
    <header class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="logo">
                <span class="logo-mark">TC</span>
                <span>TradeCircle</span>
            </a>

            <form id="navSearchForm" class="nav-search" autocomplete="off">
                <input id="navSearchInput" type="search" placeholder="Search products...">
                <button type="submit" class="btn btn-primary">Search</button>
            </form>

            <nav id="authLinks" class="nav-links" aria-label="Primary"></nav>
        </div>
    </header>

    <main class="page-wrap">
        <section class="hero">
            <p class="eyebrow">Secure buying and selling</p>
            <h1>Find quality products in your city with confidence.</h1>
            <p>
                TradeCircle combines moderation, fraud reporting, and reputation scoring so every deal feels safer.
            </p>
            <div class="hero-actions">
                <a href="dashboard.html" class="btn btn-primary">Start Selling</a>
                <a href="#marketplace" class="btn btn-secondary">Browse Listings</a>
            </div>
        </section>

        <section id="marketplace" class="panel">
            <div class="panel-head">
                <h2>Marketplace</h2>
                <p>Search by title and filter by location.</p>
            </div>

            <form id="listingFilterForm" class="filter-row" autocomplete="off">
                <input id="searchInput" type="search" placeholder="Search by title...">
                <select id="locationFilter">
                    <option value="">All Locations</option>
                </select>
                <button type="submit" class="btn btn-primary">Apply</button>
            </form>
        </section>

        <section id="listingGrid" class="listing-grid" aria-live="polite"></section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="script.js" defer></script>
</body>
</html>
