<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TradeCircle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="topbar">
    <a class="brand" href="index.html">TradeCircle</a>
    <div class="top-links">
        <a href="register.html" class="pill-link">Create Account</a>
    </div>
</nav>

<div class="container auth-shell">
    <section class="auth-card">
        <p class="eyebrow">Welcome Back</p>
        <h2 class="centered-title">Login</h2>
        <form id="loginForm" class="auth-form" novalidate>
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="Email" autocomplete="email" required>
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" required>
            <button type="submit">Login</button>
        </form>
        <p id="authStatus" class="status" aria-live="polite"></p>
        <p class="centered-link">
            <a href="register.html">Don't have an account? Register</a>
        </p>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
