<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TradeCircle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">
    <header class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="logo">
                <span class="logo-mark">TC</span>
                <span>TradeCircle</span>
            </a>

            <form id="navSearchForm" class="nav-search" autocomplete="off">
                <input id="navSearchInput" type="search" placeholder="Search products...">
                <button type="submit" class="btn btn-primary">Search</button>
            </form>

            <nav id="authLinks" class="nav-links" aria-label="Primary"></nav>
        </div>
    </header>

    <main class="page-wrap auth-page">
        <section class="panel auth-panel">
            <div class="panel-head">
                <h1>Welcome back</h1>
                <p>Login to manage your listings and reputation.</p>
            </div>

            <form id="loginForm" class="form-stack" autocomplete="on">
                <label>
                    Email
                    <input type="email" name="email" required placeholder="you@example.com">
                </label>

                <label>
                    Password
                    <input type="password" name="password" required minlength="6" placeholder="At least 6 characters">
                </label>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <p class="panel-foot">
                New to TradeCircle?
                <a href="register.html">Create an account</a>
            </p>
        </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="script.js" defer></script>
</body>
</html>
