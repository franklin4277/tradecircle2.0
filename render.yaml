services:
  - type: web
    name: tradecircle-website
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: ENABLE_SIMULATED_PAYMENTS
        value: false
      - key: ALLOW_ADMIN_REGISTRATION
        value: false
      - key: ALLOW_ADMIN_PROMOTION
        value: false
